services:
  n8n:
    image: n8nio/n8n:2.11.4
    container_name: n8n-job-search
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - GENERIC_TIMEZONE=Asia/Kolkata
      - TZ=Asia/Kolkata
      - N8N_SECURE_COOKIE=true
      - WEBHOOK_URL=https://${VM_IP}.nip.io/
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      - N8N_HOST=${VM_IP}.nip.io
      - N8N_PROTOCOL=https
      - N8N_EDITOR_BASE_URL=https://${VM_IP}.nip.io/
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - N8N_EXTERNAL_ALLOWED_ENVIRONMENT_VARIABLES=GEMINI_API_KEY
      - N8N_RUNNERS_GRANT_TOKEN_TTL=60
    volumes:
      - n8n_data:/home/node/.n8n
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - n8n-net

  caddy:
    image: caddy:2-alpine
    container_name: caddy-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - VM_IP=${VM_IP}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - n8n-net
    depends_on:
      - n8n

volumes:
  n8n_data:
    external: true
    name: n8n_n8n_data
  caddy_data:
    external: true
    name: n8n_caddy_data
  caddy_config:
    external: true
    name: n8n_caddy_config

networks:
  n8n-net:
    driver: bridge
