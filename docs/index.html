<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LinkedIn Automation — Docs</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container {
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    p {
      color: #555;
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }
    .cards {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    a.card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      text-decoration: none;
      padding: 1.5rem 2rem;
      border-radius: 12px;
      width: 180px;
      font-weight: 500;
      font-size: 0.95rem;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.10);
    }
    a.card:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    }
    a.card .icon { font-size: 2rem; }
    .dark-card {
      background: #1a1a2e;
      color: #e2e2e2;
    }
    .light-card {
      background: #ffffff;
      color: #1a1a1a;
      border: 1px solid #e0e0e0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>LinkedIn Automation</h1>
    <p>Architecture diagrams for the n8n job search workflow.</p>
    <div class="cards">
      <a class="card dark-card" href="architecture_diagrams_dark.html">
        <span class="icon">🌙</span>
        Dark Mode
      </a>
      <a class="card light-card" href="architecture_diagrams_light.html">
        <span class="icon">☀️</span>
        Light Mode
      </a>
    </div>
  </div>
</body>
</html>
